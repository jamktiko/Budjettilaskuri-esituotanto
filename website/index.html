<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS CloudFormation | Testisivu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="glow-effect"></div>
      <header>
        <h1>AWS Static Website22222</h1>
        <p class="subtitle">Created with CloudFormation</p>
      </header>

      <main>
        <div class="card-grid">
          <div class="info-card">
            <h3>Main region</h3>
            <p>us-east-1</p>
            <span class="location">N. Virginia</span>
          </div>
          <div class="info-card">
            <h3>Replication</h3>
            <p>us-west-2</p>
            <span class="location">Oregon</span>
          </div>
        </div>

        <div class="tech-stack">
          <p>S3 Buckets • CloudFront CDN • Route 53</p>
        </div>
      </main>
    </div>
    <div class="info-card">
      <h3>Backend Test</h3>
      <button id="test-button" style="padding: 10px; cursor: pointer">
        Testaa yhteys
      </button>
      <p id="status-message">Status: Odottaa...</p>
      <div
        id="response-data"
        style="font-size: 0.8em; margin-top: 10px; color: #666"
      ></div>
    </div>
    <script>
      const testButton = document.getElementById('test-button');
      const statusMsg = document.getElementById('status-message');
      const responseData = document.getElementById('response-data');

      // KORVAA TÄMÄ omalla Beanstalk-osoitteellasi (esim. http://myapp.eu-central-1.elasticbeanstalk.com/api/test)
      const BACKEND_URL =
        'http://testi-env-2.eba-n5qzi6jr.eu-central-1.elasticbeanstalk.com/test-db';

      testButton.addEventListener('click', async () => {
        statusMsg.textContent = 'Status: Ladataan...';
        statusMsg.style.color = 'orange';

        try {
          const response = await fetch(BACKEND_URL);

          if (response.ok) {
            const data = await response.json();
            statusMsg.textContent = 'Status: Yhteys toimii! ✅';
            statusMsg.style.color = 'green';
            responseData.textContent =
              'Backend vastaus: ' + JSON.stringify(data);
          } else {
            throw new Error('Palvelin vastasi virheellä: ' + response.status);
          }
        } catch (error) {
          statusMsg.textContent = 'Status: Virhe yhteydessä ❌';
          statusMsg.style.color = 'red';
          responseData.textContent = error.message;
          console.error('Yhteysvirhe:', error);
        }
      });
    </script>
  </body>
</html>
